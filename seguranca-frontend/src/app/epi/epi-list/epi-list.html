<section class="container mt-4">
    <article class="mb-4">
        <h2>Lista de equipamentos de proteção individual</h2>

    </article>
    <table class="table table-striped table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>Nome do EPI</th>
                <th>Categoria</th>
                <th>CA</th>
            </tr>
            </thead>
            <tbody>
                <tr *ngFor="let epi of epis">
                    <td>{{ epi.nome }}</td>
                    <td>{{ epi.categoria }}</td>
                    <td>{{ epi.ca }}</td>
                </tr>
            </tbody>
    </table>
    <button class="btn btn-outline-success">Comprar</button>
    <a routerLink="/epi/detalhe" class="btn btn-outline-primary">
       
        Ver detalhes

    </a>

    <a [routerLink]="['/epi/detalhe']" [queryParams]="{ id: 1 }" class="btn  btn-outline-secondary">​

        Enviar ID

    </a>
</section>
